when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: syntax-and-tools
    image: ghcr.io/astral-sh/uv:python3.13-alpine@sha256:6e2a6c29c5d6e2e99479a2b8a4f14e717e3403a5e49631800466bbdd2a878929
    commands:
      - uv sync --frozen
      - uv run python -c "import apple_mail_mcp"
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF
