depends_on:
  - lint
  - check

when:
  - event: manual
  - event: [push, pull_request]
    branch: main
  - event: tag

steps:
  - name: build-mcpb
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    commands:
      - apk add --no-cache bash zip jq
      - bash apple-mail-mcpb/build-mcpb.sh
      - |
        n=$(jq '.tools | length' apple-mail-mcpb/manifest.json)
        [ "$n" -eq 37 ] || { echo "ERROR: Expected 37 tools, got $n"; exit 1; }
        echo "OK: $n tools in manifest"
