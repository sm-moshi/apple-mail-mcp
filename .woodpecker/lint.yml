when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: ruff
    image: ghcr.io/astral-sh/uv:python3.13-alpine@sha256:4d9ff8f3d71cbb0d885e4ac0327e4f2456ea879713d6f260849af203d3b7a386
    commands:
      - uv sync --frozen
      - uv run ruff check .
      - uv run ruff format --check .
