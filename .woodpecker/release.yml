depends_on:
  - build

when:
  - event: tag

steps:
  - name: build-mcpb
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    commands:
      - apk add --no-cache bash zip
      - bash apple-mail-mcpb/build-mcpb.sh

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:a440616606c466da664c4fc3e73ad2d770e153528e72fb9ad94673a06563c72f
    settings:
      api_key:
        from_secret: github_token
      files:
        - "*.mcpb"
      title: "Release ${CI_COMMIT_TAG}"

  - name: update-homebrew
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache git curl
      - VERSION="${CI_COMMIT_TAG#v}"
      - TARBALL_URL="https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz"
      - echo "Fetching SHA256 for ${TARBALL_URL}..."
      - SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
      - echo "Version=${VERSION} SHA256=${SHA256}"
      - git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/tap.git" /tmp/tap
      - cd /tmp/tap
      - sed -i "s|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz\"|" Formula/apple-mail-mcp.rb
      - sed -i "s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA256}\"|" Formula/apple-mail-mcp.rb
      - git config user.name "Woodpecker CI"
      - git config user.email "ci@m0sh1.cc"
      - git add Formula/apple-mail-mcp.rb
      - git diff --cached --quiet && echo "No changes" && exit 0
      - git commit -m "chore(apple-mail-mcp): bump to ${VERSION}"
      - git push
