when:
  - event: manual
  - event: [push, pull_request]
    branch: main
  - event: tag

steps:
  - name: syntax-and-tools
    image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:854be5a4ef8b701008c2bef4075df76284065636af5efdc8b017f2f2749de95c
    commands:
      - uv sync --frozen
      - uv run python -c "import apple_mail_mcp"
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF
