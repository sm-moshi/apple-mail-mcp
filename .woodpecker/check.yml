when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: syntax
    image: ghcr.io/astral-sh/uv:python3.13-bookworm
    commands:
      - uv sync --frozen
      - uv run python -m py_compile apple_mail_mcp.py

  - name: verify-tools
    image: ghcr.io/astral-sh/uv:python3.13-bookworm
    commands:
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 29, "Expected 29 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF
