when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: syntax-and-tools
    image: ghcr.io/astral-sh/uv:python3.13-alpine@sha256:4d9ff8f3d71cbb0d885e4ac0327e4f2456ea879713d6f260849af203d3b7a386
    commands:
      - uv sync --frozen
      - uv run python -c "import apple_mail_mcp"
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF
