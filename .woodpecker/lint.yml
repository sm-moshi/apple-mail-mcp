when:
  - event: manual
  - event: [push, pull_request]
    branch: main
  - event: tag

steps:
  - name: ruff
    image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:854be5a4ef8b701008c2bef4075df76284065636af5efdc8b017f2f2749de95c
    commands:
      - uv sync --frozen
      - uv run ruff check .
      - uv run ruff format --check .
