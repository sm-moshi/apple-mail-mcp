name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
        with:
          version: "latest"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  check:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
        with:
          version: "latest"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check Python syntax
        run: uv run python -c "import apple_mail_mcp"

      - name: Verify 37 tools register
        run: |
          uv run python -c "
          from apple_mail_mcp import mcp
          n = len(mcp._tool_manager._tools)
          assert n == 37, 'Expected 37 tools, got %d' % n
          print('OK: %d tools registered' % n)
          "

  build:
    name: Build MCPB
    runs-on: ubuntu-latest
    needs: [lint, check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build bundle
        run: bash apple-mail-mcpb/build-mcpb.sh

      - name: Verify manifest tool count
        run: |
          tool_count=$(python3 -c "import json; m=json.load(open('apple-mail-mcpb/manifest.json')); print(len(m['tools']))")
          echo "Tools in manifest: ${tool_count}"
          [ "$tool_count" -eq 37 ] || { echo "ERROR: Expected 37, got ${tool_count}"; exit 1; }

      - name: Upload bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: apple-mail-mcp-mcpb
          path: "*.mcpb"
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, check, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build bundle
        run: bash apple-mail-mcpb/build-mcpb.sh

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "*.mcpb"
          generate_release_notes: true
