name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  check:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check Python syntax
        run: uv run python -m py_compile apple_mail_mcp.py

      - name: Verify 29 tools register
        run: uv run python -c "from apple_mail_mcp import mcp; n = len(mcp._tool_manager._tools); assert n == 29, f'Expected 29 tools, got {n}'; print(f'OK: {n} tools registered')"

  build:
    name: Build MCPB
    runs-on: ubuntu-latest
    needs: [lint, check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build bundle
        run: bash apple-mail-mcpb/build-mcpb.sh

      - name: Verify manifest tool count
        run: |
          tool_count=$(python3 -c "import json; m=json.load(open('apple-mail-mcpb/manifest.json')); print(len(m['tools']))")
          echo "Tools in manifest: ${tool_count}"
          [ "$tool_count" -eq 29 ] || { echo "ERROR: Expected 29, got ${tool_count}"; exit 1; }

      - name: Upload bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apple-mail-mcp-mcpb
          path: "*.mcpb"
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, check, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build bundle
        run: bash apple-mail-mcpb/build-mcpb.sh

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "*.mcpb"
          generate_release_notes: true
