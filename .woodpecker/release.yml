when:
  - event: tag

steps:
  - name: build-mcpb
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    commands:
      - apk add --no-cache bash zip
      - bash apple-mail-mcpb/build-mcpb.sh

  - name: release
    image: woodpeckerci/plugin-release@sha256:cc609a30e586ded9aa21fb690b6fff03bfd6991c1a0f63ce14dc80784a2d99f0
    settings:
      api_key:
        from_secret: forgejo_token
      files:
        - "*.mcpb"
      title: "Release ${CI_COMMIT_TAG}"
