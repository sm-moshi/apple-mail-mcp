when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: syntax
    image: ghcr.io/astral-sh/uv:python3.13-bookworm@sha256:47965cdc9d53a515f68f78241161c901e70051ce428f12e791bd7fe19f6a631a
    commands:
      - uv sync --frozen
      - uv run python -m py_compile apple_mail_mcp.py

  - name: verify-tools
    image: ghcr.io/astral-sh/uv:python3.13-bookworm@sha256:47965cdc9d53a515f68f78241161c901e70051ce428f12e791bd7fe19f6a631a
    commands:
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF
