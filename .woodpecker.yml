when:
  - event: manual
  - event: [push, pull_request]
    branch: main
  - event: tag

steps:
  - name: lint
    image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:2d328eb17f7d6a8c3996d2de739e78b18c96a6b89ce72ee665a4aa06088ac629
    commands:
      - uv sync --frozen
      - uv run ruff check .
      - uv run ruff format --check .

  - name: check
    image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:2d328eb17f7d6a8c3996d2de739e78b18c96a6b89ce72ee665a4aa06088ac629
    commands:
      - uv sync --frozen
      - uv run python -c "import apple_mail_mcp"
      - uv run python tests/test_runtime_features.py
      - uv run python tests/test_release_notes.py
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF

  - name: build-mcpb
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    depends_on:
      - lint
      - check
    commands:
      - apk add --no-cache bash zip jq
      - |
        if [ -n "${CI_COMMIT_TAG}" ]; then
          export APPLE_MAIL_MCP_VERSION="${CI_COMMIT_TAG#v}"
          echo "Building tagged release ${APPLE_MAIL_MCP_VERSION}"
        fi
      - bash apple-mail-mcpb/build-mcpb.sh
      - |
        n=$(jq '.tools | length' apple-mail-mcpb/manifest.json)
        [ "$n" -eq 37 ] || { echo "ERROR: Expected 37 tools, got $n"; exit 1; }
        echo "OK: $n tools in manifest"
      - |
        if [ -n "${CI_COMMIT_TAG}" ]; then
          MCPB_FILE="apple-mail-mcp-v${CI_COMMIT_TAG#v}.mcpb"
          test -f "${MCPB_FILE}" || { echo "Missing tagged build artifact: ${MCPB_FILE}"; exit 1; }
          sha256sum "${MCPB_FILE}" > "${MCPB_FILE}.sha256"
        else
          echo "Non-tag build: skipping release asset checksum generation"
        fi

  - name: release-notes
    image: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:2d328eb17f7d6a8c3996d2de739e78b18c96a6b89ce72ee665a4aa06088ac629
    depends_on:
      - build-mcpb
    when:
      - event: tag
    commands:
      - apk add --no-cache git
      - |
        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
          git fetch --force --tags --unshallow
        else
          git fetch --force --tags
        fi
      - uv run python scripts/generate_release_notes.py --repo sm-moshi/apple-mail-mcp --tag "${CI_COMMIT_TAG}" --output RELEASE_NOTES.md
      - VERSION="${CI_COMMIT_TAG#v}"
      - cp RELEASE_NOTES.md "apple-mail-mcp-v${VERSION}.release-notes.md"
      - test -s "apple-mail-mcp-v${VERSION}.release-notes.md"

  - name: github-release
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    depends_on:
      - release-notes
    when:
      - event: tag
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache git gh
      - export GH_TOKEN="${GITHUB_TOKEN}"
      - VERSION="${CI_COMMIT_TAG#v}"
      - MCPB_FILE="apple-mail-mcp-v${VERSION}.mcpb"
      - SHA_FILE="${MCPB_FILE}.sha256"
      - NOTES_FILE="apple-mail-mcp-v${VERSION}.release-notes.md"
      - |
        for file in "${MCPB_FILE}" "${SHA_FILE}" "${NOTES_FILE}"; do
          test -f "${file}" || { echo "Missing release asset: ${file}"; exit 1; }
        done
      - |
        if gh release view "${CI_COMMIT_TAG}" --repo "sm-moshi/apple-mail-mcp" >/dev/null 2>&1; then
          gh release upload "${CI_COMMIT_TAG}" "${MCPB_FILE}" "${SHA_FILE}" "${NOTES_FILE}" --repo "sm-moshi/apple-mail-mcp" --clobber
          gh release edit "${CI_COMMIT_TAG}" --repo "sm-moshi/apple-mail-mcp" --title "Release ${CI_COMMIT_TAG}" --notes-file "${NOTES_FILE}"
        else
          gh release create "${CI_COMMIT_TAG}" "${MCPB_FILE}" "${SHA_FILE}" "${NOTES_FILE}" --repo "sm-moshi/apple-mail-mcp" --verify-tag --title "Release ${CI_COMMIT_TAG}" --notes-file "${NOTES_FILE}"
        fi

  - name: update-homebrew
    image: dhi.io/alpine-base:3.23-dev@sha256:fb5ea621f50f24533355a8c58ca68aa9b5b5cd0af080feeb7f66ba1611069212
    depends_on:
      - github-release
    when:
      - event: tag
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache git curl
      - VERSION="${CI_COMMIT_TAG#v}"
      - TARBALL_URL="https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz"
      - echo "Fetching SHA256 for ${TARBALL_URL}..."
      - SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
      - echo "Version=${VERSION} SHA256=${SHA256}"
      - git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/tap.git" /tmp/tap
      - cd /tmp/tap
      - sed -i "s|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/v.*\\.tar\\.gz\"|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz\"|" Formula/apple-mail-mcp.rb
      - sed -i "s|sha256 \"[a-f0-9]\\{64\\}\"|sha256 \"${SHA256}\"|" Formula/apple-mail-mcp.rb
      - git config user.name "Woodpecker CI"
      - git config user.email "ci@m0sh1.cc"
      - git add Formula/apple-mail-mcp.rb
      - git diff --cached --quiet && echo "No changes" && exit 0
      - |
        git commit -m "chore(apple-mail-mcp) bump to ${VERSION}"
        git push
