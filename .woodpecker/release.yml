when:
  - event: tag

steps:
  - name: build-mcpb
    image: debian:bookworm-slim@sha256:74d56e3931e0d5a1dd51f8c8a2466d21de84a271cd3b5a733b803aa91abf4421
    commands:
      - apt-get update -qq && apt-get install -y -qq zip python3 > /dev/null
      - bash apple-mail-mcpb/build-mcpb.sh

  - name: release
    image: woodpeckerci/plugin-release@sha256:cc609a30e586ded9aa21fb690b6fff03bfd6991c1a0f63ce14dc80784a2d99f0
    settings:
      api_key:
        from_secret: forgejo_token
      files:
        - "*.mcpb"
      title: "Release ${CI_COMMIT_TAG}"
